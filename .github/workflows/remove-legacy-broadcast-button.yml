name: Remove Legacy Broadcast Button

on:
  push:
    branches:
      - feat/ivr-245-stream-controls-themes-performance

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/ivr-245-stream-controls-themes-performance
          fetch-depth: 0
      - name: Remove legacy command usage
        run: node .github/scripts/remove-legacy-broadcast-button.mjs
      - name: Remove temporary patch files
        run: rm .github/scripts/remove-legacy-broadcast-button.mjs .github/workflows/remove-legacy-broadcast-button.yml
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/src/AppV2.tsx .github/scripts/remove-legacy-broadcast-button.mjs .github/workflows/remove-legacy-broadcast-button.yml
          git commit -m "旧配信ページCommand呼び出しを削除"
          git push origin HEAD:feat/ivr-245-stream-controls-themes-performance
