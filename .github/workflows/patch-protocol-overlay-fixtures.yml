name: Patch Protocol Overlay Fixtures

on:
  push:
    branches:
      - feat/ivr-245-stream-controls-themes-performance

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/ivr-245-stream-controls-themes-performance
          fetch-depth: 0
      - name: Patch protocol fixtures
        run: node .github/scripts/patch-protocol-overlay-fixtures.mjs
      - name: Remove temporary files
        run: rm .github/scripts/patch-protocol-overlay-fixtures.mjs .github/workflows/patch-protocol-overlay-fixtures.yml
      - name: Commit fixture updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/obs-protocol/test/protocol.test.ts packages/obs-protocol/test/protocol-v4.test.ts .github/scripts/patch-protocol-overlay-fixtures.mjs .github/workflows/patch-protocol-overlay-fixtures.yml
          git commit -m "Protocol fixtureへOverlay既定値を追加"
          git push origin HEAD:feat/ivr-245-stream-controls-themes-performance
