name: Diagnose pnpm install

on:
  push:
    branches:
      - feat/windows-packaging
    paths:
      - '.github/workflows/diagnose-pnpm-install.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/windows-packaging
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Capture install failure
        shell: bash
        run: |
          set +e
          pnpm install --frozen-lockfile > /tmp/pnpm-install.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "exit_code=$status"
            tail -n 160 /tmp/pnpm-install.log
          } > diagnostics/pnpm-install.txt
          exit 0
      - name: Commit diagnostic and remove workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/pnpm-install.txt
          git rm .github/workflows/diagnose-pnpm-install.yml
          git commit -m '追加のpnpm依存復元失敗を記録'
          git push origin HEAD:feat/windows-packaging
