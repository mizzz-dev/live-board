name: Apply Overlay Compatibility Patch

on:
  push:
    branches:
      - feat/ivr-245-stream-controls-themes-performance

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/ivr-245-stream-controls-themes-performance
          fetch-depth: 0
      - name: Apply focused Overlay patch
        run: node .github/scripts/patch-overlay-compat.mjs
      - name: Remove temporary patch files
        run: rm .github/scripts/patch-overlay-compat.mjs .github/workflows/apply-overlay-compat.yml
      - name: Commit compatibility fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/overlay/src/App.tsx .github/scripts/patch-overlay-compat.mjs .github/workflows/apply-overlay-compat.yml
          git commit -m "Overlayで旧Snapshotのテーマ設定を補完"
          git push origin HEAD:feat/ivr-245-stream-controls-themes-performance
