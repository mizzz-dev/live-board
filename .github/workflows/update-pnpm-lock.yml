name: Update Persistence Lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lockfile:
    if: github.head_ref == 'feat/ivr-244-liveboard-persistence-recovery'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/ivr-244-liveboard-persistence-recovery
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Remove temporary workflow
        run: rm .github/workflows/update-pnpm-lock.yml
      - name: Commit lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git add .github/workflows/update-pnpm-lock.yml
          git commit -m "永続化workspaceをpnpm lockfileへ反映"
          git push origin HEAD:feat/ivr-244-liveboard-persistence-recovery
