name: Apply Persistence Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feat/ivr-244-liveboard-persistence-recovery'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/ivr-244-liveboard-persistence-recovery
          fetch-depth: 0
      - name: Apply focused patch
        run: node .github/scripts/patch-appv2.mjs
      - name: Remove temporary patch files
        run: |
          rm .github/scripts/patch-appv2.mjs
          rm .github/workflows/appv2-patch.yml
      - name: Commit focused changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/src/AppV2.tsx
          git add apps/desktop/electron/persistence-service.ts
          git add packages/persistence/src/archive.ts
          git add .github/scripts/patch-appv2.mjs
          git add .github/workflows/appv2-patch.yml
          git commit -m "Desktopへ永続化UIと原子的保存修正を反映"
          git push origin HEAD:feat/ivr-244-liveboard-persistence-recovery
