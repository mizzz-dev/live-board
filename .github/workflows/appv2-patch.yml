name: Build Persistence Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Apply focused patch
        run: node .github/scripts/patch-appv2.mjs
      - name: Upload patched files
        uses: actions/upload-artifact@v4
        with:
          name: patched-persistence-files
          path: |
            apps/desktop/src/AppV2.tsx
            apps/desktop/electron/persistence-service.ts
            packages/persistence/src/archive.ts
          retention-days: 1
