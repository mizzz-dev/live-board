name: IVR-247 Update README

on:
  push:
    branches:
      - feat/asset-http-delivery
    paths:
      - .github/ivr-247-readme.trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/asset-http-delivery
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update README
        run: node scripts/update-readme-asset-http.mjs
      - name: Commit README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "READMEへ画像AssetのHTTP分離配信を反映"
          git push origin HEAD:feat/asset-http-delivery
