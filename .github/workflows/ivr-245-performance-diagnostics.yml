name: IVR-245 Performance Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Capture Domain performance output
        shell: bash
        run: |
          set +e
          pnpm --filter @live-board/domain test > domain.log 2>&1
          echo "$?" > domain-status.txt
          exit 0
      - name: Capture OBS Bridge output
        shell: bash
        run: |
          set +e
          pnpm --filter @live-board/obs-bridge test > bridge.log 2>&1
          echo "$?" > bridge-status.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ivr-245-performance-diagnostics
          path: |
            domain.log
            domain-status.txt
            bridge.log
            bridge-status.txt
          retention-days: 1
