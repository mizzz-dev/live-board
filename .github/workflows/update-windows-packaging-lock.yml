name: Update Windows packaging lockfile

on:
  push:
    branches:
      - feat/windows-packaging
    paths:
      - '.github/workflows/update-windows-packaging-lock.yml'

permissions:
  contents: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/windows-packaging

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update lockfile
        run: pnpm install --lockfile-only

      - name: Commit lockfile and remove temporary workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git rm .github/workflows/update-windows-packaging-lock.yml
          git commit -m 'Windows配布依存のlockfileを更新'
          git push origin HEAD:feat/windows-packaging
