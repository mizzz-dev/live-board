name: Apply IVR-245 App Patch

on:
  push:
    branches:
      - feat/ivr-245-stream-controls-themes-performance

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/ivr-245-stream-controls-themes-performance
          fetch-depth: 0
      - name: Apply focused App patch
        run: node .github/scripts/patch-ivr-245-app.mjs
      - name: Remove temporary patch files
        run: rm .github/scripts/patch-ivr-245-app.mjs .github/workflows/apply-ivr-245-app.yml
      - name: Commit App integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/src/AppV2.tsx .github/scripts/patch-ivr-245-app.mjs .github/workflows/apply-ivr-245-app.yml
          git commit -m "Desktopへ配信操作・テーマ・遅延サムネイルを接続"
          git push origin HEAD:feat/ivr-245-stream-controls-themes-performance
