name: Update Persistence Documentation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  documentation:
    if: github.head_ref == 'feat/ivr-244-liveboard-persistence-recovery'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/ivr-244-liveboard-persistence-recovery
          fetch-depth: 0
      - name: Update documentation
        run: node .github/scripts/update-persistence-docs.mjs
      - name: Remove temporary files
        run: |
          rm .github/scripts/update-persistence-docs.mjs
          rm .github/workflows/update-persistence-docs.yml
      - name: Commit documentation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git add docs/security.md
          git add .github/scripts/update-persistence-docs.mjs
          git add .github/workflows/update-persistence-docs.yml
          git commit -m "永続化と復元の実装状況をドキュメントへ反映"
          git push origin HEAD:feat/ivr-244-liveboard-persistence-recovery
