name: IVR-247 Fix Asset HTTP Test

on:
  push:
    branches:
      - feat/asset-http-delivery
    paths:
      - .github/ivr-247-fix-test.trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/asset-http-delivery
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fix test
        run: node scripts/fix-asset-http-test-token.mjs
      - name: Commit test fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Asset HTTP配信テストのtoken境界を修正"
          git push origin HEAD:feat/asset-http-delivery
