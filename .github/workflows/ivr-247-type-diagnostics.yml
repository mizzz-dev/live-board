name: IVR-247 Type Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Capture typecheck output
        shell: bash
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          echo "$?" > typecheck-status.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ivr-247-type-diagnostics
          path: |
            typecheck.log
            typecheck-status.txt
          retention-days: 1
