name: Update Windows packaging README

on:
  push:
    branches:
      - feat/windows-packaging
    paths:
      - '.github/workflows/update-windows-packaging-readme.yml'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/windows-packaging
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Update README
        run: python .github/scripts/update-windows-packaging-readme.py
      - name: Commit README and remove temporary files
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git rm .github/scripts/update-windows-packaging-readme.py
          git rm .github/workflows/update-windows-packaging-readme.yml
          git commit -m 'READMEへWindows配布パッケージ手順を追加'
          git push origin HEAD:feat/windows-packaging
