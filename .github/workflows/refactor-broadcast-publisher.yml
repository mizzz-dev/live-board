name: Refactor Broadcast Publisher

on:
  push:
    branches:
      - feat/ipc-layer-patch
    paths:
      - .github/workflows/refactor-broadcast-publisher.yml
      - .github/scripts/refactor-broadcast-publisher.mjs

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/ipc-layer-patch
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply changes
        run: node .github/scripts/refactor-broadcast-publisher.mjs
      - name: Remove temporary files
        run: rm .github/scripts/refactor-broadcast-publisher.mjs .github/workflows/refactor-broadcast-publisher.yml
      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/electron/main.ts .github
          git commit -m "Main側の配信Snapshot管理を分離"
          git push origin HEAD:feat/ipc-layer-patch
