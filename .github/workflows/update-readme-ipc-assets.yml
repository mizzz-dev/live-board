name: Update README IPC Assets

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/ipc-asset-registration
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update README
        run: node scripts/update-readme-ipc-assets.mjs
      - name: Commit README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "READMEへRendererとMain間のAsset一回登録を反映"
          git push origin HEAD:feat/ipc-asset-registration
