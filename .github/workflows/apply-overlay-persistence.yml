name: Apply Overlay Persistence Patch

on:
  push:
    branches:
      - feat/ivr-245-stream-controls-themes-performance

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/ivr-245-stream-controls-themes-performance
          fetch-depth: 0
      - name: Apply focused persistence patch
        run: node .github/scripts/patch-overlay-persistence.mjs
      - name: Remove temporary patch files
        run: rm .github/scripts/patch-overlay-persistence.mjs .github/workflows/apply-overlay-persistence.yml
      - name: Commit persistence boundary fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/obs-protocol/src/overlay-settings.ts packages/persistence/src/archive.ts .github/scripts/patch-overlay-persistence.mjs .github/workflows/apply-overlay-persistence.yml
          git commit -m "配信設定を永続化境界で安全に正規化"
          git push origin HEAD:feat/ivr-245-stream-controls-themes-performance
