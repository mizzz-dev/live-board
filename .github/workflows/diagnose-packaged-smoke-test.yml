name: Diagnose packaged smoke test

on:
  push:
    branches:
      - feat/windows-packaging
    paths:
      - '.github/workflows/diagnose-packaged-smoke-test.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/windows-packaging
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @live-board/obs-protocol build
      - run: pnpm --filter @live-board/persistence build
      - name: Capture focused test result
        shell: bash
        run: |
          set +e
          pnpm --filter @live-board/desktop exec vitest run test/packaged-smoke-test.test.ts > /tmp/test.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "exit_code=$status"
            cat /tmp/test.log
          } > diagnostics/packaged-smoke-test.txt
          exit 0
      - name: Commit diagnostic and remove workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/packaged-smoke-test.txt
          git rm .github/workflows/diagnose-packaged-smoke-test.yml
          git commit -m 'パッケージsmoke Unit Testの診断結果を記録'
          git push origin HEAD:feat/windows-packaging
