name: Apply Persistence Type Fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feat/ivr-244-liveboard-persistence-recovery'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/ivr-244-liveboard-persistence-recovery
          fetch-depth: 0
      - name: Apply type fixes
        run: node .github/scripts/fix-persistence-types.mjs
      - name: Remove temporary files
        run: |
          rm .github/scripts/fix-persistence-types.mjs
          rm .github/workflows/fix-persistence-types.yml
      - name: Commit focused changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/electron/contracts.ts
          git add apps/desktop/electron/persistence-service.ts
          git add apps/desktop/electron/preload.ts
          git add .github/scripts/fix-persistence-types.mjs
          git add .github/workflows/fix-persistence-types.yml
          git commit -m "永続化IPCの厳密な型境界を修正"
          git push origin HEAD:feat/ivr-244-liveboard-persistence-recovery
